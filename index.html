<!DOCTYPE html>
<html>
<head>
  <title>🔥 Bet Tracker</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 { color: gold; }

    input, select, button {
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: gold;
      cursor: pointer;
      font-weight: bold;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td, th {
      border: 1px solid white;
      padding: 10px;
    }

    .shanks { color: red; }
    .whitebeard { color: lightblue; }
  </style>
</head>

<body>

<h1>🔥 Me VS My Buddy</h1>

<h3>Players</h3>
<p class="shanks"><b>Player 1:</b> Shanks</p>
<p class="whitebeard"><b>Player 2:</b> Whitebeard</p>

<h3>Add Match</h3>
<input id="match" placeholder="Match Name">
<input id="amount" type="number" placeholder="Amount">

<select id="winner">
  <option value="">Select Winner</option>
  <option value="Shanks">Shanks</option>
  <option value="Whitebeard">Whitebeard</option>
</select>

<br>
<button onclick="addMatch()">Add Match</button>

<h3>Matches</h3>
<table>
  <thead>
    <tr>
      <th>Match</th>
      <th>Amount</th>
      <th>Winner</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<h3>Scoreboard</h3>
<p id="score"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGKX55Vsq5K7J74UTT49s-VLr6Zwik35A",
  authDomain: "me-vs-my-buddy.firebaseapp.com",
  projectId: "me-vs-my-buddy",
  storageBucket: "me-vs-my-buddy.firebasestorage.app",
  messagingSenderId: "746521229620",
  appId: "1:746521229620:web:12564f1daeb6a74c798d61"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const p1 = "Shanks";
const p2 = "Whitebeard";

let matches = [];

// ➕ Add Match
window.addMatch = async function () {
  let match = document.getElementById("match").value;
  let amount = parseInt(document.getElementById("amount").value);
  let winner = document.getElementById("winner").value;

  if (!match || !amount || !winner) {
    alert("Fill all fields!");
    return;
  }

  await addDoc(collection(db, "bets"), {
    match,
    amount,
    winner
  });

  document.getElementById("match").value = "";
  document.getElementById("amount").value = "";
};

// 🗑️ Delete Match
window.deleteMatch = async function (id) {
  if (confirm("Delete this match?")) {
    await deleteDoc(doc(db, "bets", id));
  }
};

// 🔄 Real-time sync
onSnapshot(collection(db, "bets"), (snapshot) => {
  matches = [];
  snapshot.forEach(d => {
    matches.push({
      id: d.id,
      ...d.data()
    });
  });
  render();
});

// 📊 Render
function render() {
  let p1Total = 0;
  let p2Total = 0;

  let html = "";

  matches.forEach(m => {
    if (m.winner === p1) p1Total += m.amount;
    else if (m.winner === p2) p2Total += m.amount;

    html += `
      <tr>
        <td>${m.match}</td>
        <td>₹${m.amount}</td>
        <td>${m.winner}</td>
        <td>
          <button onclick="deleteMatch('${m.id}')">❌</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;

  let diff = p1Total - p2Total;
  let owesText = "";

  if (diff > 0) {
    owesText = `${p2} owes ${p1} ₹${diff}`;
  } else if (diff < 0) {
    owesText = `${p1} owes ${p2} ₹${Math.abs(diff)}`;
  } else {
    owesText = "All settled 🤝";
  }

  document.getElementById("score").innerText =
    `${p1}: ₹${p1Total} | ${p2}: ₹${p2Total}\n${owesText}`;
}
</script>

</body>
</html>
