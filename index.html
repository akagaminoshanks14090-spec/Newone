<!DOCTYPE html>
<html>
<head>
  <title>Live Bet Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    input, select, button { margin: 5px; padding: 8px; }
    table { margin: auto; border-collapse: collapse; }
    td, th { border: 1px solid black; padding: 10px; }
  </style>
</head>
<body>

<h1>🔥 Live Bet Tracker</h1>

<h2>Players</h2>
<input id="p1" placeholder="Player 1">
<input id="p2" placeholder="Player 2">

<h2>Add Match</h2>
<input id="match" placeholder="Match Name">
<input id="amount" type="number" placeholder="Amount">
<select id="winner"></select>

<button onclick="addMatch()">Add Match</button>

<h2>Matches</h2>
<table>
  <thead>
    <tr>
      <th>Match</th>
      <th>Amount</th>
      <th>Winner</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<h2>Scoreboard</h2>
<p id="score"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGKX55Vsq5K7J74UTT49s-VLr6Zwik35A",
  authDomain: "me-vs-my-buddy.firebaseapp.com",
  projectId: "me-vs-my-buddy",
  storageBucket: "me-vs-my-buddy.firebasestorage.app",
  messagingSenderId: "746521229620",
  appId: "1:746521229620:web:12564f1daeb6a74c798d61"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let matches = [];

function updateWinnerOptions() {
  let p1 = document.getElementById("p1").value;
  let p2 = document.getElementById("p2").value;

  document.getElementById("winner").innerHTML = `
    <option value="">Select Winner</option>
    <option value="${p1}">${p1}</option>
    <option value="${p2}">${p2}</option>
  `;
}

document.getElementById("p1").addEventListener("input", updateWinnerOptions);
document.getElementById("p2").addEventListener("input", updateWinnerOptions);

window.addMatch = async function () {
  let match = document.getElementById("match").value;
  let amount = parseInt(document.getElementById("amount").value);
  let winner = document.getElementById("winner").value;

  if (!match || !amount || !winner) {
    alert("Fill all fields!");
    return;
  }

  await addDoc(collection(db, "bets"), {
    match,
    amount,
    winner
  });
};

// 🔥 REAL-TIME SYNC
onSnapshot(collection(db, "bets"), (snapshot) => {
  matches = [];
  snapshot.forEach(doc => matches.push(doc.data()));
  render();
});

function render() {
  let p1 = document.getElementById("p1").value;
  let p2 = document.getElementById("p2").value;

  let p1Total = 0;
  let p2Total = 0;

  let html = "";

  matches.forEach(m => {
    if (m.winner === p1) p1Total += m.amount;
    else if (m.winner === p2) p2Total += m.amount;

    html += `
      <tr>
        <td>${m.match}</td>
        <td>₹${m.amount}</td>
        <td>${m.winner}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
  document.getElementById("score").innerText =
    `${p1}: ₹${p1Total} | ${p2}: ₹${p2Total}`;
}
</script>

</body>
</html>
