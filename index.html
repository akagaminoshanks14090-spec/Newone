// ---------------- SINGLE API FETCH ----------------
async function fetchAllData() {
  try {
    const res = await fetch("https://cricbuzz-cricket.p.rapidapi.com/matches/v1/live", {
      method: "GET",
      headers: {
        "X-RapidAPI-Key": "YOUR_API_KEY",
        "X-RapidAPI-Host": "cricbuzz-cricket.p.rapidapi.com"
      }
    });

    const data = await res.json();

    let match = data?.typeMatches?.[0]?.seriesMatches?.[0]?.seriesAdWrapper?.matches?.[0];
    if (!match) return;

    displayMatch(match);
    processMatches(data);

  } catch (err) {
    console.error("API error:", err);
  }
}

// ---------------- LIVE DASHBOARD ----------------
function displayMatch(match) {
  let team1 = match.matchInfo.team1.teamSName;
  let team2 = match.matchInfo.team2.teamSName;

  let s1 = match.matchScore?.team1Score?.inngs1;
  let s2 = match.matchScore?.team2Score?.inngs1;

  document.getElementById("liveMatchCard").innerHTML =
    `<h3>${team1} vs ${team2}</h3>`;

  document.getElementById("scoreDetails").innerHTML =
    `<p>${team1}: ${s1?.runs||"-"}/${s1?.wickets||"-"} (${s1?.overs||"-"})</p>
     <p>${team2}: ${s2?.runs||"-"}/${s2?.wickets||"-"} (${s2?.overs||"-"})</p>`;

  document.getElementById("matchStatus").innerText =
    match.matchInfo.status;
}

// ---------------- AUTO WINNER DETECTION ----------------
function processMatches(apiData) {
  let list = apiData?.typeMatches?.[0]?.seriesMatches || [];

  list.forEach(series => {
    if (!series.seriesAdWrapper) return;

    series.seriesAdWrapper.matches.forEach(match => {

      let team1 = match.matchInfo.team1.teamSName;
      let team2 = match.matchInfo.team2.teamSName;
      let status = match.matchInfo.status;

      if (status && status.toLowerCase().includes("won")) {

        let winner = status.includes(team1) ? team1 : team2;

        let localMatch = matchList.find(m =>
          m.teams.includes(team1) && m.teams.includes(team2)
        );

        if (localMatch) {
          updateMatchResult(localMatch.id, winner);
        }
      }
    });
  });
}

// ---------------- FIREBASE UPDATE ----------------
async function updateMatchResult(matchId, winner) {

  if (matchResults[matchId] === winner) return;

  matchResults[matchId] = winner;

  await addDoc(collection(db, "match_results"), {
    matchId,
    winner
  });

  console.log("Auto updated:", matchId, winner);
}

// ---------------- FIREBASE LISTENER ----------------
onSnapshot(collection(db,"bets"),snap=>{
  matches=[];
  snap.forEach(d=>matches.push({id:d.id,...d.data()}));
  render();
});

// ---------------- RENDER ----------------
function render(){
  let p1T=0, p2T=0;

  matches.forEach(m => {
    if(m.status==="Resolved"){
      if(m.winner===p1) p1T+=m.amount;
      else p2T+=m.amount;
    }
  });

  document.getElementById("score").innerText =
    p1T>p2T ? `${p2} owes ${p1} ₹${p1T-p2T}` :
    p2T>p1T ? `${p1} owes ${p2} ₹${p2T-p1T}` :
    "All settled 🤝";
}

// ---------------- AUTO START ----------------
fetchAllData(); // immediate
setInterval(fetchAllData, 10000);
