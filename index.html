<!DOCTYPE html>
<html>
<head>
  <title>🔥 Bet Tracker ULTRA</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #0f2027, #000);
      color: white;
      text-align: center;
    }

    h1 { color: gold; }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 15px;
      margin: 10px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    select {
      padding: 10px;
      border-radius: 8px;
    }

    #coin {
      width: 100px;
      height: 100px;
      margin: auto;
      border-radius: 50%;
      background: radial-gradient(circle, gold, orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 0 20px gold;
    }

    .flip { animation: flip 1s ease; }

    @keyframes flip {
      0% { transform: rotateY(0); }
      100% { transform: rotateY(1800deg); }
    }

    table {
      width: 95%;
      margin: auto;
      border-collapse: collapse;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    img.logo {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: white;
      padding: 3px;
      margin-right: 5px;
    }

    canvas { max-width: 300px; margin: auto; }

    .currentMatch {
      background: rgba(0,255,0,0.2);
      font-weight: bold;
    }
  </style>
</head>

<p>Shanks ⚔️ vs Whitebeard 🌊</p>

  <h3>🏏 Live IPL Scoreboard</h3>
  
</div>

<div class="card">
  <select id="match"></select>
</div>

  <h3>🪙 Toss Arena</h3>

  <button onclick="initToss()">Start Toss</button>
  <p id="callerName"></p>

  <select id="callChoice" disabled>
    <option value="">Head/Tail</option>
    <option>Head</option>
    <option>Tail</option>
  </select>

  <br><br>
  <button onclick="startToss()">Flip Coin</button>

  <p id="tossResult"></p>

  <select id="teamChoice"></select>
</div>

<div class="card">
  <button onclick="addMatch()">Add Match ₹100</button>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Match</th>
        <th>Winner</th>
        <th>Toss</th>
        <th>Team</th>
        <th></th>
      </tr>

<div class="card">

<div class="card">

// dropdown
const dropdown=document.getElementById("match");
matchList.forEach(m=>{
  let o=document.createElement("option");
  o.value=m.id; o.text=m.name;
  dropdown.appendChild(o);
});

// auto today match
function selectTodayMatch(){
  let today=new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});
  let m=matchList.find(x=>x.date===today);
  if(m) dropdown.value=m.id;
}
selectTodayMatch();

// toss start
window.initToss=function(){
  caller=Math.random()>0.5?p1:p2;
  document.getElementById("callerName").innerText=`🎯 ${caller} will call`;
  document.getElementById("callChoice").disabled=false;
};

// toss flip
window.startToss=function(){
  let call=document.getElementById("callChoice").value;
  if(!call||!caller) return alert("Start toss properly");

  let coin=document.getElementById("coin");
  coin.classList.add("flip");

  setTimeout(()=>{
    let result=Math.random()>0.5?"Head":"Tail";
    coin.innerText=result==="Head"?"H":"T";

    tossWinner=(call===result)?caller:(caller===p1?p2:p1);

    document.getElementById("tossResult").innerText=
      `${caller} → ${call} → ${result} → ${tossWinner}`;

    let m=matchList.find(x=>x.id==dropdown.value);

    document.getElementById("teamChoice").innerHTML=`
      <option value="">Choose Team</option>
      <option>${m.teams[0]}</option>
      <option>${m.teams[1]}</option>
    `;

    coin.classList.remove("flip");
  },1000);
};

// ADD MATCH (manual winner)
window.addMatch=async function(){

  let team=document.getElementById("teamChoice").value;
  if(!team||!tossWinner) return alert("Finish toss");

  let m=matchList.find(x=>x.id==dropdown.value);

  let real=prompt(`Enter winner (${m.teams[0]}/${m.teams[1]})`);

  let winner=(team===real)?tossWinner:(tossWinner===p1?p2:p1);

  await addDoc(collection(db,"bets"),{
    match:m.name,winner,team,tossWinner,amount:100
  });

  tossWinner="";
};

// delete
window.deleteMatch=id=>deleteDoc(doc(db,"bets",id));

// render
onSnapshot(collection(db,"bets"),snap=>{
  matches=[]; snap.forEach(d=>matches.push({id:d.id,...d.data()}));
  render();
});

function render(){
  let p1T=0,p2T=0,html="",last="",streak=0;
  let today=new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});

  matches.forEach(m=>{
    if(m.winner===p1) p1T+=100;
    else p2T+=100;

    if(m.winner===last) streak++;
    else {streak=1; last=m.winner;}

    let isToday = matchList.find(x=>x.name===m.match)?.date===today;

    html+=`
    <tr class="${isToday?'currentMatch':''}">
      <td>${m.match}</td>
      <td>${m.winner}</td>
      <td>${m.tossWinner}</td>
      <td><img class="logo" src="${logos[m.team]}"> ${m.team}</td>
      <td><button onclick="deleteMatch('${m.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML=html;

  let diff=p1T-p2T;

  document.getElementById("score").innerText=
    diff>0?`${p2} owes ${p1} ₹${diff}`:
    diff<0?`${p1} owes ${p2} ₹${Math.abs(diff)}`:
    "All settled 🤝";

  let total=p1T+p2T;
  document.getElementById("chances").innerText=
    `${p1}: ${(p1T/total*100||50).toFixed(1)}% | ${p2}: ${(p2T/total*100||50).toFixed(1)}%`;

  document.getElementById("streak").innerText=
    `🔥 Streak: ${last} (${streak})`;

  updateChart(p1T,p2T);
}

// chart
let chart;
function updateChart(a,b){
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{labels:[p1,p2],datasets:[{data:[a,b]}]}
  });
}

</script>
