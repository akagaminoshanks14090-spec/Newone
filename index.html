<!DOCTYPE html>
<html>
<head>
  <title>Dosti Rahegi ya Nhi ?</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #0f2027, #000);
      color: white;
      text-align: center;
    }

    h1 { color: gold; }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 15px;
      margin: 10px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      font-weight: bold;
      width: 95%;
    }

    #coin {
      width: 100px;
      height: 100px;
      margin: auto;
      border-radius: 50%;
      background: radial-gradient(circle, gold, orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 0 20px gold;
    }

    .flip { animation: flip 1s ease; }

    @keyframes flip {
      0% { transform: rotateY(0); }
      100% { transform: rotateY(1800deg); }
    }

    table {
      width: 95%;
      margin: auto;
      border-collapse: collapse;
      font-size: 14px;
    }

    td, th {
      padding: 8px 5px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    img.logo {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: white;
      padding: 2px;
      margin-right: 5px;
      vertical-align: middle;
      object-fit: contain;
    }

    canvas { max-width: 300px; margin: auto; }

    .currentMatch {
      background: rgba(0,255,0,0.1);
    }

    /* COMPACT CENTERED CALENDAR STYLES */
    .calendar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .calendar-layout {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      width: 100%;
      margin-top: 10px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, clamp(30px, 8vw, 35px));
      gap: 4px;
    }
    .cal-day {
      background: rgba(255,255,255,0.1);
      padding: 6px 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
    }
    .cal-day:hover { background: rgba(255,255,255,0.3); }
    
    /* UPCOMING MATCH COLOR */
    .cal-day.has-match {
      background: rgba(0, 255, 136, 0.2);
      border: 1px solid #00ff88;
    }
    
    /* COMPLETED MATCH COLOR */
    .cal-day.completed-match {
      background: rgba(0, 170, 255, 0.2);
      border: 1px solid #00aaff;
      color: white;
    }

    /* TODAY'S COLOR */
    .cal-day.today {
      background: gold !important;
      color: black !important;
      font-weight: bold;
      box-shadow: 0 0 10px gold;
      border: none !important;
    }

    .cal-header {
      font-weight: bold;
      color: #aaa;
      font-size: 10px;
      padding-bottom: 2px;
    }

    /* Side Logos */
    .team-logo-large {
      width: clamp(60px, 18vw, 85px);
      height: clamp(60px, 18vw, 85px);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
      object-fit: contain;
      transition: transform 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .badge-pending {
      background: rgba(255, 165, 0, 0.2);
      color: orange;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .btn-resolve {
      background: #00ff88;
      color: black;
      padding: 4px 8px;
      font-size: 11px;
      margin-top: 4px;
    }
  </style>
</head>

const dropdown = document.getElementById("match");

// CALENDAR & MATCH FIXING LOGIC
function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const monthLabel = document.getElementById("calendarMonth");
  
  let todayDate = new Date();
  let todayStr = todayDate.toLocaleDateString("en-CA", {timeZone: "Asia/Kolkata"});
  
  let year = todayDate.getFullYear();
  let month = todayDate.getMonth();
  
  monthLabel.innerText = `📅 ${todayDate.toLocaleString('default', { month: 'long' })} ${year}`;
  
  let firstDay = new Date(year, month, 1).getDay();
  let daysInMonth = new Date(year, month + 1, 0).getDate();
  
  let html = '';
  const days = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
  days.forEach(d => html += `<div class="cal-header">${d}</div>`);
  
  for(let i=0; i<firstDay; i++) { html += `<div></div>`; }
  
  for(let d=1; d<=daysInMonth; d++) {
    let dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    
    let hasMatch = matchList.some(m => m.date === dateStr);
    let isToday = dateStr === todayStr;
    let isPast = dateStr < todayStr;
    
    let hasResolvedBet = matches.some(bet => bet.status === "Resolved" && matchList.find(m => m.name === bet.match)?.date === dateStr);

    let classes = "cal-day";
    
    if (hasMatch) {
      if (hasResolvedBet || isPast) {
        classes += " completed-match";
      } else {
        classes += " has-match"; 
      }
    }
    
    if (isToday) classes += " today"; 
    
    html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${d}</div>`;
  }
  grid.innerHTML = html;
}

window.updateCalendarLogos = function() {
  const matchId = dropdown.value;
  const logoLeft = document.getElementById("calLogoLeft");
  const logoRight = document.getElementById("calLogoRight");
  
  if (!matchId) {
    logoLeft.style.display = "none";
    logoRight.style.display = "none";
    return;
  }

  let m = matchList.find(x => x.id == matchId);
  if (m) {
    // Failsafe in case a local file is ever deleted
    logoLeft.onerror = function() { this.onerror=null; this.src=`https://ui-avatars.com/api/?name=${m.teams[0]}&background=random&color=fff&rounded=true&size=128&bold=true`; };
    logoRight.onerror = function() { this.onerror=null; this.src=`https://ui-avatars.com/api/?name=${m.teams[1]}&background=random&color=fff&rounded=true&size=128&bold=true`; };
    
    logoLeft.src = logos[m.teams[0]];
    logoRight.src = logos[m.teams[1]];
    
    logoLeft.style.display = "block";
    logoRight.style.display = "block";
  }
};

window.selectDate = function(dateStr) {
  let matchesOnDate = matchList.filter(x => x.date === dateStr);
  const statusText = document.getElementById("calendarSelectedMatch");
  
  dropdown.innerHTML = "";

  if(matchesOnDate.length > 0) {
    matchesOnDate.forEach(m => {
      let o = document.createElement("option");
      o.value = m.id; o.text = m.name;
      dropdown.appendChild(o);
    });
    
    statusText.innerText = matchesOnDate.length > 1 ? `Selected: ${matchesOnDate.length} Matches` : `Selected: ${matchesOnDate[0].name}`;
    statusText.style.color = "#00ff88";
  } else {
    let o = document.createElement("option");
    o.value = ""; o.text = "No matches scheduled today";
    dropdown.appendChild(o);
    
    statusText.innerText = "No match on this date";
    statusText.style.color = "#ff4444";
  }

  tossWinner="";
  document.getElementById("tossResult").innerText = "";
  document.getElementById("teamChoice").innerHTML = "";
  document.getElementById("callerName").innerText = "";
  document.getElementById("callChoice").value = "";
  document.getElementById("callChoice").disabled = true;

  updateCalendarLogos();
}

function selectTodayMatch() {
  let today = new Date().toLocaleDateString("en-CA", {timeZone: "Asia/Kolkata"});
  selectDate(today); 
}

// ------------------------------ //

window.initToss=function(){
  if(!dropdown.value) return alert("Please select a valid match day on the calendar first!");

  caller=Math.random()>0.5?p1:p2;
  document.getElementById("callerName").innerText=`🎯 ${caller} will call`;
  document.getElementById("callChoice").disabled=false;
};

window.startToss=function(){
  let call=document.getElementById("callChoice").value;
  if(!call||!caller) return alert("Start toss properly");

  let coin=document.getElementById("coin");
  coin.classList.add("flip");

  setTimeout(()=>{
    let result=Math.random()>0.5?"Head":"Tail";
    coin.innerText=result==="Head"?"H":"T";

    tossWinner=(call===result)?caller:(caller===p1?p2:p1);
    document.getElementById("tossResult").innerText=`${caller} → ${call} → ${result} → ${tossWinner} wins toss!`;

    let m=matchList.find(x=>x.id==dropdown.value);
    document.getElementById("teamChoice").innerHTML=`
      <option value="">Choose Team</option>
      <option>${m.teams[0]}</option>
      <option>${m.teams[1]}</option>
    `;

    coin.classList.remove("flip");
  },1000);
};

window.lockBet=async function(){
  if(!dropdown.value) return alert("Please select a match!");
  let team=document.getElementById("teamChoice").value;
  if(!team||!tossWinner) return alert("Finish toss first!");

  let m=matchList.find(x=>x.id==dropdown.value);

  await addDoc(collection(db,"bets"),{
    match: m.name,
    team: team,
    tossWinner: tossWinner,
    amount: 100,
    status: "Pending",
    winner: null 
  });

  tossWinner="";
  document.getElementById("tossResult").innerText = "";
  document.getElementById("teamChoice").innerHTML = "";
  document.getElementById("callerName").innerText = "";
  document.getElementById("callChoice").value = "";
  document.getElementById("callChoice").disabled = true;
};

window.resolveBet = async function(id) {
  let bet = matches.find(b => b.id === id);
  let m = matchList.find(x => x.name === bet.match);
  
  if (!m) return alert("Could not find match info!");

  let realMatchWinner = prompt(`Who won the actual match? (${m.teams[0]} or ${m.teams[1]})`);
  
  if (!realMatchWinner || (realMatchWinner !== m.teams[0] && realMatchWinner !== m.teams[1])) {
    return alert(`Please type exactly ${m.teams[0]} or ${m.teams[1]}`);
  }

  let betWinner = (bet.team === realMatchWinner) ? bet.tossWinner : (bet.tossWinner === p1 ? p2 : p1);

  await updateDoc(doc(db, "bets", id), {
    status: "Resolved",
    winner: betWinner
  });
};

window.deleteMatch=id=>deleteDoc(doc(db,"bets",id));

onSnapshot(collection(db,"bets"),snap=>{
  matches=[]; snap.forEach(d=>matches.push({id:d.id,...d.data()}));
  render();
});

function render(){
  let p1T=0, p2T=0, html="", last="", streak=0;
  let today=new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});

  matches.forEach(m => {
    if (m.status === "Resolved") {
      if(m.winner === p1) p1T += m.amount;
      else p2T += m.amount;

      if(m.winner === last) streak++;
      else { streak=1; last=m.winner; }
    }

    let isToday = matchList.find(x=>x.name===m.match)?.date===today;
    
    let winnerCellHTML = m.status === "Pending" 
      ? `<div class="badge-pending">⏳ Pending</div>
         <button class="btn-resolve" onclick="resolveBet('${m.id}')">🏆 Set Winner</button>` 
      : m.winner;

    html+=`
    <tr class="${isToday?'currentMatch':''}">
      <td style="font-size: 11px;">${m.match}</td>
      <td>${winnerCellHTML}</td>
      <td>${m.tossWinner}</td>
      <td><img class="logo" src="${logos[m.team]}" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${m.team}&background=random&color=fff&rounded=true&size=128&bold=true';">${m.team}</td>
      <td><button onclick="deleteMatch('${m.id}')" style="padding: 5px; background: #ff4444; color: white;">❌</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML=html;

  let diff = p1T - p2T;
  document.getElementById("score").innerText =
    diff > 0 ? `${p2} owes ${p1} ₹${diff}` :
    diff < 0 ? `${p1} owes ${p2} ₹${Math.abs(diff)}` :
    "All settled 🤝";

  let total = p1T + p2T;
  if (total > 0) {
    document.getElementById("chances").innerText = `${p1}: ${(p1T/total*100).toFixed(1)}% | ${p2}: ${(p2T/total*100).toFixed(1)}%`;
  } else {
    document.getElementById("chances").innerText = "No matches resolved yet.";
  }

  document.getElementById("streak").innerText = last ? `🔥 Streak: ${last} (${streak})` : `🔥 Streak: 0`;

  updateChart(p1T, p2T);
  
  renderCalendar();
  
  if(!document.getElementById("calendarSelectedMatch").innerText) {
      selectTodayMatch();
  }
}

let chart;
function updateChart(a,b){
  if(chart) chart.destroy();
  if(a === 0 && b === 0) return;
  
  chart=new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{labels:[p1,p2],datasets:[{data:[a,b]}]},
    options: { plugins: { legend: { labels: { color: 'white' } } } }
  });
}

</script>
